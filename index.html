<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>釜山旅記 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">

    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
        }
    }
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'at-beige': '#F7F4EB', 'at-green': '#A8C69F', 'at-brown': '#8D775F', 'at-yellow': '#F9E5AF', 'at-blue': '#A2D2FF' },
                    fontFamily: { 'maru': ['"Zen Maru Gothic"', 'serif'] }
                }
            }
        }
    </script>
    <style>
        body { background: #F7F4EB; color: #8D775F; font-family: 'Zen Maru Gothic'; -webkit-tap-highlight-color: transparent; }
        .at-card { background: white; border-radius: 28px; padding: 20px; box-shadow: 4px 4px 0px #E0E5D5; }
        .active-tab { color: #A8C69F; transform: translateY(-5px); transition: all 0.3s; }
        .boarding-pass { background: linear-gradient(135deg, #A8C69F 0%, #8DA984 100%); color: white; border-radius: 24px; position: relative; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module" data-type="babel">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "firebase/firestore";

        const { useState, useEffect } = React;

        // 你的 Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyC4IbiHWsJE52xLhjf2eDodtO6UZKOgBhY",
            authDomain: "busan2026-210a7.firebaseapp.com",
            projectId: "busan2026-210a7",
            storageBucket: "busan2026-210a7.firebasestorage.app",
            messagingSenderId: "861407234236",
            appId: "1:861407234236:web:95d5e38b3cedd8a8b2a8b9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function App() {
            const [activeTab, setActiveTab] = useState('schedule');
            const [expenses, setExpenses] = useState([]);
            const [amount, setAmount] = useState('');
            const [item, setItem] = useState('');

            // 即時讀取記帳資料
            useEffect(() => {
                const q = query(collection(db, "expenses"), orderBy("timestamp", "desc"));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    setExpenses(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => unsubscribe();
            }, []);

            const addExpense = async () => {
                if (!amount || !item) return;
                await addDoc(collection(db, "expenses"), {
                    item, amount: Number(amount), timestamp: Date.now()
                });
                setAmount(''); setItem('');
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32">
                    <header className="p-6 flex justify-between items-end">
                        <div><h1 className="text-3xl font-black text-[#5A4D3F]">釜山旅記</h1><p className="text-sm font-bold opacity-60">06/06 - 06/11</p></div>
                        <div className="at-card py-2 px-4 text-at-green font-black">D-67</div>
                    </header>

                    <main className="px-5">
                        {activeTab === 'schedule' && <ScheduleView />}
                        {activeTab === 'booking' && <BookingView />}
                        {activeTab === 'expense' && (
                            <div className="space-y-4">
                                <div className="at-card bg-at-brown text-white">
                                    <p className="text-xs">總支出 (KRW)</p>
                                    <h2 className="text-3xl font-black">₩ {expenses.reduce((acc, cur) => acc + cur.amount, 0).toLocaleString()}</h2>
                                </div>
                                <div className="at-card space-y-3">
                                    <input value={item} onChange={e => setItem(e.target.value)} placeholder="消費項目" className="w-full p-3 bg-at-beige rounded-xl outline-none" />
                                    <input value={amount} onChange={e => setAmount(e.target.value)} type="number" placeholder="金額 (KRW)" className="w-full p-3 bg-at-beige rounded-xl outline-none" />
                                    <button onClick={addExpense} className="w-full bg-at-green text-white py-3 rounded-xl font-black">新增記帳</button>
                                </div>
                                <div className="space-y-2">
                                    {expenses.map(exp => (
                                        <div key={exp.id} className="at-card flex justify-between py-3">
                                            <span className="font-bold">{exp.item}</span>
                                            <span className="font-black text-red-400">₩ {exp.amount.toLocaleString()}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </header>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] bg-white h-20 rounded-[35px] shadow-2xl flex justify-around items-center px-4 z-50">
                        <NavBtn id="schedule" icon="fa-calendar-day" label="行程" active={activeTab} set={setActiveTab} />
                        <NavBtn id="booking" icon="fa-ticket-alt" label="預訂" active={activeTab} set={setActiveTab} />
                        <NavBtn id="expense" icon="fa-coins" label="記帳" active={activeTab} set={setActiveTab} />
                    </nav>
                </div>
            );
        }

        const ScheduleView = () => (
            <div className="space-y-4">
                <div className="at-card border-l-8 border-at-green">
                    <div className="flex justify-between items-start mb-2">
                        <span className="text-xs font-black opacity-40">11:30</span>
                        <span className="text-[10px] bg-at-yellow px-2 py-0.5 rounded-full font-bold">#必吃美食</span>
                    </div>
                    <h3 className="font-black text-lg">伍班長烤肉</h3>
                    <p className="text-xs opacity-70 mb-4">海雲台名店，肝連肉必點！</p>
                    <button className="w-full bg-at-beige py-2 rounded-xl font-bold text-xs" onClick={() => window.open('https://maps.google.com')}>立即導航</button>
                </div>
            </div>
        );

        const BookingView = () => (
            <div className="boarding-pass p-6 shadow-lg">
                <p className="font-black italic border-b border-white/20 pb-2 mb-4">EVA AIR BR170</p>
                <div className="flex justify-between items-center px-2">
                    <div className="text-center"><p className="text-3xl font-black">台北</p></div>
                    <i className="fas fa-plane"></i>
                    <div className="text-center"><p className="text-3xl font-black">釜山</p></div>
                </div>
            </div>
        );

        const NavBtn = ({ id, icon, label, active, set }) => (
            <button onClick={() => set(id)} className={`flex flex-col items-center gap-1 ${active === id ? 'active-tab' : 'text-gray-300'}`}>
                <i className={`fas ${icon} text-xl`}></i>
                <span className="text-[10px] font-black">{label}</span>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
