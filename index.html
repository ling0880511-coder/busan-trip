<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>釜山旅記 2026 | 森友風格手帳</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        'at-beige': '#F7F4EB', 'at-green': '#A8C69F', 
                        'at-brown': '#8D775F', 'at-yellow': '#F9E5AF',
                        'at-blue': '#A2D2FF', 'at-sand': '#E0E5D5',
                        'at-red': '#FF8B8B'
                    },
                    borderRadius: { 'at': '28px' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F7F4EB; color: #8D775F; font-family: 'Zen Maru Gothic', sans-serif; overflow-x: hidden; }
        .at-card { background: white; border-radius: 28px; padding: 20px; box-shadow: 4px 4px 0px #E0E5D5; border: 2px solid #FFFFFF; margin-bottom: 16px; transition: all 0.2s; }
        .at-card:active { transform: scale(0.98); }
        .nav-active { color: #A8C69F; transform: translateY(-4px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .boarding-pass { background: linear-gradient(135deg, #A8C69F 0%, #8DA984 100%); color: white; border-radius: 24px; position: relative; overflow: hidden; }
        input, select { background: #FDFCF8; border: 2px solid #E0E5D5; border-radius: 12px; padding: 8px 12px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #A8C69F; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('schedule');
            const [selectedDate, setSelectedDate] = useState('06/06');
            
            // --- 資料狀態管理 (暫存於 LocalStorage) ---
            const [schedules, setSchedules] = useState(JSON.parse(localStorage.getItem('schedules')) || [
                { id: 1, date: '06/06', time: '11:30', title: '伍班長烤肉', desc: '必吃肝連肉，記得配蒸蛋！', type: '美食', location: '해운대 오반장' },
                { id: 2, date: '06/06', time: '14:00', title: '海雲台藍線公園', desc: '膠囊小火車，風景超級美', type: '景點', location: 'Blue Line Park' }
            ]);

            const [expenses, setExpenses] = useState(JSON.parse(localStorage.getItem('expenses')) || []);

            useEffect(() => {
                localStorage.setItem('schedules', JSON.stringify(schedules));
                localStorage.setItem('expenses', JSON.stringify(expenses));
            }, [schedules, expenses]);

            // --- 新增行程功能 ---
            const addSchedule = () => {
                const title = prompt("景點/餐廳名稱？");
                if(!title) return;
                const newId = Date.now();
                setSchedules([...schedules, { id: newId, date: selectedDate, time: '12:00', title, desc: '點擊編輯詳情', type: '景點', location: '' }]);
            };

            const deleteSchedule = (id) => {
                if(confirm("確定要刪除這個行程嗎？")) {
                    setSchedules(schedules.filter(s => s.id !== id));
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32">
                    {/* Header */}
                    <header className="p-6 flex justify-between items-end">
                        <div>
                            <h1 className="text-3xl font-black text-[#5A4D3F] tracking-tight">釜山旅記 <span className="text-at-blue">2026</span></h1>
                            <p className="text-xs font-bold opacity-60">D-67 • 06/06 出發</p>
                        </div>
                        <div className="at-card py-2 px-4 flex flex-col items-center leading-none">
                            <span className="text-[10px] font-black opacity-50 mb-1">天氣</span>
                            <i className="fas fa-sun text-at-yellow text-xl"></i>
                        </div>
                    </header>

                    <main className="px-5">
                        {/* 分頁切換渲染 */}
                        {activeTab === 'schedule' && (
                            <div className="space-y-4 animate-in fade-in">
                                {/* 橫向日期選擇 */}
                                <div className="flex gap-3 overflow-x-auto no-scrollbar py-2">
                                    {['06/06', '06/07', '06/08', '06/09', '06/10'].map(d => (
                                        <button 
                                            key={d} onClick={() => setSelectedDate(d)}
                                            className={`flex-shrink-0 w-16 h-20 rounded-at flex flex-col items-center justify-center transition-all ${selectedDate === d ? 'bg-at-green text-white shadow-lg' : 'bg-white shadow-soft'}`}
                                        >
                                            <span className="text-[10px] font-bold opacity-60">JUNE</span>
                                            <span className="text-xl font-black">{d.split('/')[1]}</span>
                                        </button>
                                    ))}
                                </div>

                                <h2 className="text-xl font-black mt-4 flex justify-between items-center">
                                    今日行程 
                                    <button onClick={addSchedule} className="text-sm bg-at-green text-white px-3 py-1 rounded-full">+ 新增</button>
                                </h2>

                                {schedules.filter(s => s.date === selectedDate).map(item => (
                                    <div key={item.id} className="at-card relative group">
                                        <button onClick={() => deleteSchedule(item.id)} className="absolute -top-2 -right-2 bg-at-red text-white w-6 h-6 rounded-full text-xs opacity-0 group-hover:opacity-100 transition-opacity shadow-md">✕</button>
                                        <div className="flex justify-between items-start mb-2">
                                            <span className="text-xs font-black opacity-40">{item.time}</span>
                                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${item.type === '美食' ? 'bg-at-yellow text-at-brown' : 'bg-at-blue text-white'}`}>#{item.type}</span>
                                        </div>
                                        <h3 className="font-black text-lg">{item.title}</h3>
                                        <p className="text-xs opacity-70 mb-4">{item.desc}</p>
                                        <div className="flex gap-2">
                                            <button className="flex-1 bg-at-beige py-2 rounded-xl text-xs font-bold hover:bg-at-sand" onClick={() => window.open(`https://www.google.com/maps/search/${item.location}`)}><i className="fas fa-map-marked-alt mr-1 text-at-green"></i> 導航</button>
                                            <button className="flex-1 bg-at-beige py-2 rounded-xl text-xs font-bold hover:bg-at-sand"><i className="fas fa-search mr-1 text-at-blue"></i> 攻略</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'booking' && (
                            <div className="space-y-4 animate-in slide-in-from-right">
                                <h2 className="text-xl font-black">預訂憑證</h2>
                                <div className="boarding-pass p-6 shadow-lg">
                                    <div className="flex justify-between items-center mb-6 border-b border-white/20 pb-4">
                                        <span className="font-black italic text-lg">EVA AIR</span>
                                        <span className="text-[10px] font-bold bg-white/20 px-2 py-1 rounded">BR170</span>
                                    </div>
                                    <div className="flex justify-between items-center px-2">
                                        <div className="text-center"><p className="text-xs opacity-70">TPE</p><p className="text-3xl font-black">台北</p></div>
                                        <i className="fas fa-plane text-2xl animate-pulse"></i>
                                        <div className="text-center"><p className="text-xs opacity-70">PUS</p><p className="text-3xl font-black">釜山</p></div>
                                    </div>
                                </div>
                                <div className="at-card">
                                    <h3 className="font-black mb-2 flex items-center gap-2"><i className="fas fa-hotel text-at-green"></i> 住宿：Signiel Busan</h3>
                                    <p className="text-xs opacity-60">地址：Haeundae-gu, Busan</p>
                                    <div className="mt-4 pt-4 border-t border-at-beige flex justify-between items-center">
                                        <span className="text-xs font-bold">查看 PIN 碼</span>
                                        <button className="bg-at-brown text-white px-4 py-1 rounded-full text-xs" onClick={() => { if(prompt("請輸入 PIN") === "007") alert("密碼正確：旅館 PIN 為 1234"); }}>解鎖</button>
