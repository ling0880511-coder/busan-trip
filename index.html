<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>釜山旅記 2026 | 專屬 App</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        'at-beige': '#F7F4EB', 'at-green': '#A8C69F', 
                        'at-brown': '#8D775F', 'at-yellow': '#F9E5AF',
                        'at-blue': '#A2D2FF'
                    },
                    borderRadius: { 'at': '24px' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F7F4EB; color: #8D775F; -webkit-tap-highlight-color: transparent; }
        .at-card { background: white; border-radius: 24px; padding: 20px; box-shadow: 4px 4px 0px #E0E5D5; border: 2px solid transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { color: #A8C69F; transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 這裡未來放你的 Firebase 設定 ---
        // const firebaseConfig = { ... }; 

        function App() {
            const [activeTab, setActiveTab] = useState('schedule');

            return (
                <div className="min-h-screen pb-28">
                    {/* Top Header */}
                    <header className="p-6 flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-black text-[#5A4D3F]">釜山旅記 🇰🇷</h1>
                            <p className="text-xs font-bold opacity-60">06/06 - 06/11</p>
                        </div>
                        <div className="at-card py-2 px-4 flex items-center gap-2">
                            <i className="fas fa-plane-departure text-at-green"></i>
                            <span className="text-sm font-black">D-67</span>
                        </div>
                    </header>

                    {/* 主要內容區 */}
                    <main className="px-4">
                        {activeTab === 'schedule' && <ScheduleView />}
                        {activeTab === 'booking' && <BookingView />}
                        {activeTab === 'expense' && <ExpenseView />}
                        {activeTab === 'planning' && <PlanningView />}
                        {activeTab === 'journal' && <JournalView />}
                        {activeTab === 'members' && <MemberView />}
                    </main>

                    {/* 底部導航列 (Bottom Nav) */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[95%] max-w-md bg-white/90 backdrop-blur-md h-20 rounded-[35px] shadow-2xl border border-at-beige flex justify-around items-center px-2 z-50">
                        <NavIcon icon="fa-calendar-day" label="行程" id="schedule" active={activeTab} onClick={setActiveTab} />
                        <NavIcon icon="fa-ticket-alt" label="預訂" id="booking" active={activeTab} onClick={setActiveTab} />
                        <NavIcon icon="fa-coins" label="記帳" id="expense" active={activeTab} onClick={setActiveTab} />
                        <NavIcon icon="fa-clipboard-list" label="準備" id="planning" active={activeTab} onClick={setActiveTab} />
                        <NavIcon icon="fa-camera" label="日誌" id="journal" active={activeTab} onClick={setActiveTab} />
                        <NavIcon icon="fa-users" label="成員" id="members" active={activeTab} onClick={setActiveTab} />
                    </nav>
                </div>
            );
        }

        // --- 各個分頁的內容組件 (簡化示範) ---

        const ScheduleView = () => (
            <div className="space-y-6 animate-fade-in">
                <div className="at-card bg-at-blue/10 border-at-blue/20">
                    <p className="text-xs font-bold mb-1 uppercase tracking-wider">今日天氣預報</p>
                    <div className="flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <i className="fas fa-sun text-3xl text-yellow-500"></i>
                            <span className="text-2xl font-black">22°C</span>
                        </div>
                        <span className="text-sm font-bold">釜山廣域市：晴時多雲</span>
                    </div>
                </div>
                {/* 行程卡片 */}
                <div className="at-card relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-2 h-full bg-at-green"></div>
                    <div className="flex justify-between items-start mb-2">
                        <span className="bg-at-beige px-2 py-1 rounded-lg text-[10px] font-black">11:30</span>
                        <div className="flex gap-1">
                            <span className="bg-red-100 text-red-500 text-[10px] font-bold px-2 py-0.5 rounded">#必吃美食</span>
                        </div>
                    </div>
                    <h3 className="text-lg font-black mb-1">伍班長烤肉</h3>
                    <p className="text-xs opacity-70 mb-4">海雲台名店，肝連肉必點！</p>
                    <button className="w-full bg-at-beige py-3 rounded-xl font-bold text-sm active:scale-95 transition-all">
                        <i className="fas fa-location-arrow mr-2"></i> 導航至餐廳
                    </button>
                </div>
            </div>
        );

        const BookingView = () => (
            <div className="space-y-4">
                <div className="bg-at-green rounded-at p-5 text-white shadow-at">
                    <div className="flex justify-between border-b border-white/20 pb-3 mb-3">
                        <span className="font-black italic">EVA AIR</span>
                        <span className="text-xs opacity-80 uppercase">Boarding Pass</span>
                    </div>
                    <div className="flex justify-between items-center">
                        <div className="text-center">
                            <p className="text-[10px] opacity-70">TPE</p>
                            <p className="text-2xl font-black">台北</p>
                        </div>
                        <i className="fas fa-plane"></i>
                        <div className="text-center">
                            <p className="text-[10px] opacity-70">PUS</p>
                            <p className="text-2xl font-black">釜山</p>
                        </div>
                    </div>
                </div>
            </div>
        );

        const ExpenseView = () => <div className="at-card text-center">記帳功能開發中...</div>;
        const PlanningView = () => <div className="at-card text-center">行李清單開發中...</div>;
        const JournalView = () => <div className="at-card text-center">旅遊日誌開發中...</div>;
        const MemberView = () => <div className="at-card text-center">成員名單開發中...</div>;

        const NavIcon = ({ icon, label, id, active, onClick }) => (
            <button onClick={() => onClick(id)} className={`flex flex-col items-center gap-1 transition-all ${active === id ? 'active-tab' : 'text-gray-300'}`}>
                <i className={`fas ${icon} text-xl`}></i>
                <span className="text-[9px] font-black">{label}</span>
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
